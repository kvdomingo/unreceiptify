name: unreceiptify

volumes:
  venv-data:


services:
  api:
    build: api
    user: 1000:1000
    restart: unless-stopped
    init: true
    environment:
      PYTHON_ENV: development
      AZURE_AI_ACCESS_KEY: ${AZURE_AI_ACCESS_KEY}
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT}
    command:
      - "-euxo"
      - "pipefail"
      - "-c"
      - |
        uv sync
        exec uv run fastapi dev \
          --host 0.0.0.0 \
          --port 8000 \
          --reload \
          api/app.py
    volumes:
      - ./api:/app
      - venv-data:/app/.venv
    ports:
      - '8000:8000'

  ui:
    image: oven/bun:1
    user: 1000:1000
    restart: unless-stopped
    init: true
    entrypoint: /bin/sh
    command:
    - "-eu"
    - "-c"
    - |
      bun install
      exec bun run dev
    working_dir: /app
    volumes:
      - ./ui:/app
    ports:
      - '3000:3000'
